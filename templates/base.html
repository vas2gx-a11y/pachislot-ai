<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}パチスロAIデータ管理システム{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Inter"', '"Noto Sans JP"', 'sans-serif'],
                        display: ['"Inter"', '"Noto Sans JP"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
                    },
                },
            },
        };
    </script>
    <style>
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-thumb { background-color: #d4d4d8; border-radius: 9999px; }
        summary::-webkit-details-marker { display: none; }
        summary { list-style: none; position: relative; }
        ::selection { background: rgba(24, 24, 27, 0.12); color: #18181b; }

        body {
            background: #f4f4f5; /* zinc-100 相当。参考画像の薄いグレー背景 */
        }

        /* カードコンポーネント: 白背景+薄い枠線+柔らかい影(参考画像のシンプルなカード) */
        .card {
            background: #ffffff;
            box-shadow: 0 1px 2px rgba(24, 24, 27, 0.04), 0 1px 8px -2px rgba(24, 24, 27, 0.06);
            transition: box-shadow 0.15s ease, border-color 0.15s ease;
        }
        a.card:hover {
            border-color: #d4d4d8;
            box-shadow: 0 1px 2px rgba(24, 24, 27, 0.05), 0 8px 20px -6px rgba(24, 24, 27, 0.12);
        }

        /* ヘッダーをスティッキー化(白背景+ぼかしで、スクロールしてもナビにアクセスできるように) */
        header {
            position: sticky;
            top: 0;
            z-index: 30;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            background: rgba(244, 244, 245, 0.85);
        }

        /* 設定確率バー・スコアバー: 黒基調でフラットに(参考画像のプログレスバーと同じ質感) */
        .prob-bar { position: relative; overflow: hidden; }

        /* 主要CTAボタン(黒ボタン)の押下フィードバック */
        .btn-primary { transition: transform 0.12s ease, box-shadow 0.15s ease, background-color 0.15s ease; }
        .btn-primary:hover { background-color: #27272a; }
        .btn-primary:active { transform: scale(0.98); }

        /* ボタン全般に押下時の軽いフィードバック */
        button:active { transform: scale(0.98); }

        /* フォーム要素のフォーカスに柔らかいリングを追加 */
        input:focus, textarea:focus, select:focus {
            box-shadow: 0 0 0 3px rgba(24, 24, 27, 0.08);
        }

        /* details/summary の開閉に軽いアニメーション感を出す矢印 */
        summary .chev { transition: transform 0.2s ease; display: inline-block; }
        details[open] summary .chev { transform: rotate(90deg); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card { animation: fadeInUp 0.3s ease both; }

        /*
          スマホ対策: input/textarea/select の文字サイズが16px未満だと、
          iOS Safari等がフォーカス時に画面全体を自動でズームインしてしまう。
          見た目の小ささはpadding等で調整し、文字サイズだけは
          モバイル幅では最低16pxを確保してズームを防ぐ。
        */
        @media (max-width: 767px) {
            input, textarea, select {
                font-size: 16px !important;
            }
        }

        /* アニメーションを好まない設定のユーザーには、動きを最小限にする */
        @media (prefers-reduced-motion: reduce) {
            .card { animation: none; }
        }

        /* スマホでの横幅オーバーフロー対策:
           flex-1(flex: 1 1 0%)は、Tailwindのデフォルトでは min-width が指定されないため、
           中身(input・長いテキストなど)が縮められず、狭い画面で親の横幅を突き破ることがある。
           明示的にmin-width: 0を指定して防ぐ。 */
        .flex-1 { min-width: 0; }

        /* 万一何かがはみ出しても、ページ全体が横スクロールしてしまわないようにする保険 */
        html, body { overflow-x: hidden; max-width: 100vw; }
        img, canvas, svg, table { max-width: 100%; }
    </style>
</head>
<body class="text-gray-900 min-h-screen font-sans">
    <script>
        // 画像アップロード+AI解析のような時間のかかるフォーム送信に、
        // 「📤 アップロード中 xx%」→「🤖 AI解析中...」の2段階のローディング表示を付ける。
        function wireAsyncForm(formId, opts) {
            const form = document.getElementById(formId);
            if (!form) return;
            const btn = form.querySelector('[type="submit"]');
            if (!btn) return;
            const originalHTML = btn.innerHTML;
            const uploadingText = (opts && opts.uploadingText) || 'アップロード中';
            const processingText = (opts && opts.processingText) || 'AI解析中...(数秒かかります)';

            function spinnerHTML(text) {
                return '<span class="inline-flex items-center justify-center gap-2">' +
                    '<svg class="animate-spin h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none">' +
                    '<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>' +
                    '<path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>' +
                    '</svg><span>' + text + '</span></span>';
            }

            function resetButton() {
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                btn.innerHTML = originalHTML;
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                if (btn.disabled) return; // 二重送信防止

                const xhr = new XMLHttpRequest();
                const formData = new FormData(form);

                btn.disabled = true;
                btn.classList.add('opacity-70', 'cursor-not-allowed');
                btn.innerHTML = spinnerHTML('📤 ' + uploadingText);

                xhr.upload.addEventListener('progress', function (evt) {
                    if (evt.lengthComputable) {
                        const pct = Math.round((evt.loaded / evt.total) * 100);
                        btn.innerHTML = spinnerHTML('📤 ' + uploadingText + ' ' + pct + '%');
                    }
                });
                xhr.upload.addEventListener('load', function () {
                    btn.innerHTML = spinnerHTML('🤖 ' + processingText);
                });
                xhr.addEventListener('load', function () {
                    if (xhr.status >= 200 && xhr.status < 400) {
                        window.location.href = xhr.responseURL || form.action;
                    } else {
                        alert('エラーが発生しました。もう一度お試しください。');
                        resetButton();
                    }
                });
                xhr.addEventListener('error', function () {
                    alert('通信エラーが発生しました。回線をご確認の上、もう一度お試しください。');
                    resetButton();
                });
                xhr.addEventListener('timeout', function () {
                    alert('タイムアウトしました。もう一度お試しください。');
                    resetButton();
                });
                xhr.timeout = 120000; // AI解析に時間がかかることがあるため長めに設定
                xhr.open(form.method || 'POST', form.action, true);
                xhr.send(formData);
            });
        }
    </script>


    <div class="w-full max-w-7xl mx-auto p-4 md:p-6">
        <header class="mb-6 pb-4 border-b border-gray-200">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                {% block header %}
                <div class="flex items-center gap-3">
                    <span class="text-2xl md:text-3xl">🎰</span>
                    <h1 class="font-display font-extrabold text-xl md:text-2xl text-gray-900 tracking-tight">パチスロAIデータ管理</h1>
                </div>
                {% endblock %}
                <nav class="flex gap-1 text-sm overflow-x-auto">
                    <a href="{{ url_for('records.index') }}"
                       class="shrink-0 px-3 py-2 rounded-md transition font-medium
                              {% if request.path == '/' or request.path.startswith('/records') %}bg-gray-900 text-white{% else %}text-gray-600 hover:bg-gray-200/70{% endif %}">
                        📸 データ管理
                    </a>
                    <a href="{{ url_for('machines.machines_page') }}"
                       class="shrink-0 px-3 py-2 rounded-md transition font-medium
                              {% if request.path.startswith('/machines') %}bg-gray-900 text-white{% else %}text-gray-600 hover:bg-gray-200/70{% endif %}">
                        🎯 機種スペック登録
                    </a>
                    <a href="{{ url_for('expected_value.index') }}"
                       class="shrink-0 px-3 py-2 rounded-md transition font-medium
                              {% if request.path.startswith('/expected_value') %}bg-gray-900 text-white{% else %}text-gray-600 hover:bg-gray-200/70{% endif %}">
                        🧮 期待値計算
                    </a>
                </nav>
            </div>
        </header>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="mb-6 flex flex-col gap-2">
                    {% for message in messages %}
                    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
                        ⚠️ {{ message }}
                    </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
