<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}パチスロAIデータ管理システム{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4 md:p-6">

    <div class="w-full max-w-[100%] mx-auto">
        <header class="mb-8 border-b border-gray-700 pb-4 flex flex-col md:flex-row md:items-center md:justify-between gap-2">
            {% block header %}
            <h1 class="text-3xl font-bold text-yellow-500">🎰 パチスロAIデータ管理ダッシュボード</h1>
            {% endblock %}
            <nav class="flex gap-3 text-sm">
                <a href="{{ url_for('records.index') }}" class="px-3 py-2 rounded bg-gray-800 border border-gray-700 hover:bg-gray-700 text-gray-200">📸 データ管理</a>
                <a href="{{ url_for('machines.machines_page') }}" class="px-3 py-2 rounded bg-gray-800 border border-gray-700 hover:bg-gray-700 text-gray-200">🎯 機種スペック登録</a>
                <a href="{{ url_for('expected_value.index') }}" class="px-3 py-2 rounded bg-gray-800 border border-gray-700 hover:bg-gray-700 text-gray-200">🧮 期待値計算</a>
            </nav>
        </header>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="mb-6 flex flex-col gap-2">
                    {% for message in messages %}
                    <div class="bg-red-900/60 border border-red-600 text-red-200 px-4 py-3 rounded">
                        ⚠️ {{ message }}
                    </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
