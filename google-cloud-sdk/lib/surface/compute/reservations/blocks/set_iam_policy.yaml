release_tracks: [BETA, GA, PREVIEW]

help_text:
  brief: Set the IAM policy for a Compute Engine reservation block.
  description: |
    Sets the IAM policy for the given reservation block as defined in a JSON or YAML file.

  examples: |
    The following command will read an IAM policy defined in a JSON file
    'policy.json' and set it for the reservation block `my-reservation-block`:

      $ {command} my-reservation-block --reservation=my-reservation --zone=ZONE policy.json

    See https://cloud.google.com/iam/docs/managing-policies for details of the
    policy file format and contents.

request:
  collection: compute.reservationBlocks
  api_version: v1
  use_relative_name: false
  resource_method_params:
    parentResource: '{reservationsId}'
    resource: '{reservationBlocksId}'
  modify_request_hooks:
  - googlecloudsdk.command_lib.iam.hooks:UseMaxRequestedPolicyVersion:api_field=zoneSetNestedPolicyRequest.policy.version
  BETA:
    api_version: beta
  PREVIEW:
    api_version: preview

iam:
  set_iam_policy_request_path: zoneSetNestedPolicyRequest
  message_type_overrides:
    policy: Policy
    set_iam_policy_request: ComputeReservationBlocksSetIamPolicyRequest

arguments:
  resource:
    help_text: The reservation block to set the IAM policy for.
    spec: !REF googlecloudsdk.command_lib.compute.resources:reservation_block
