- release_tracks: [ALPHA, BETA, GA]
  help_text:
    brief: Create a Data Lineage process.
    description: Create a new Data Lineage process.
    examples: |
      To create a process with ID `my-process` in location `us-central1` with display name `My Process` and origin `custom`, run:

          $ {command} my-process --location=us-central1 --display-name="My Process" --origin-source-type=custom --origin-name="my-app"

  arguments:
    resource:
      spec: !REF googlecloudsdk.command_lib.datalineage.resources:process
      help_text: The process to create.
    params:
    - arg_name: display-name
      api_field: googleCloudDatacatalogLineageV1Process.displayName
      help_text: A human-readable name for the process.
    - arg_name: origin-source-type
      api_field: googleCloudDatacatalogLineageV1Process.origin.sourceType
      help_text: |
        Type of the source. Use of a source type other than `custom` for process creation
        or updating is highly discouraged. It might be restricted in the future
        without notice. There will be increase in cost if you use any of the source
        types other than `custom`.
      default: custom
    - arg_name: origin-name
      api_field: googleCloudDatacatalogLineageV1Process.origin.name
      help_text: The name of the origin (e.g. the application or pipeline name).
    - arg_name: attributes
      api_field: googleCloudDatacatalogLineageV1Process.attributes.additionalProperties
      help_text: Additional attributes for the process.
      type:
        arg_dict:
          flatten: true
          spec:
          - api_field: key
          - api_field: value
            type: googlecloudsdk.command_lib.datalineage.hooks:ParseAttributeValue

  request:
    collection: datalineage.projects.locations.processes
    resource_method_params:
      parent: 'projects/{projectsId}/locations/{locationsId}'
    modify_request_hooks:
    - googlecloudsdk.command_lib.datalineage.hooks:SetProcessNameInBody

  output:
    format: yaml
