- release_tracks: [ALPHA, BETA, GA]

  help_text:
    brief: Update a data lineage process.
    description: Update a data lineage process.
    examples: |
      To update the display name of a process:

        $ {command} my-process --location=us-central1 --display-name="New Name"

  arguments:
    resource:
      spec: !REF googlecloudsdk.command_lib.datalineage.resources:process
      help_text: The process to update.

    params:
    - arg_name: display-name
      api_field: googleCloudDatacatalogLineageV1Process.displayName
      help_text: The new display name of the process.

    - arg_name: attributes
      api_field: googleCloudDatacatalogLineageV1Process.attributes.additionalProperties
      help_text: The new attributes of the process. This will replace any existing attributes.
      type:
        arg_dict:
          flatten: true
          spec:
          - api_field: key
          - api_field: value
            type: googlecloudsdk.command_lib.datalineage.hooks:ParseAttributeValue

  request:
    collection: datalineage.projects.locations.processes
    method: patch

  update:
    read_modify_update: true

  output:
    format: yaml
